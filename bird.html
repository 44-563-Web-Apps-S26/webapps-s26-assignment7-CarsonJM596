<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>Carson Mallen Bird Hunt</title>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <style>
            body {
                font-family: Arial, Helvetica, sans-serif;
                margin: 0;
                padding: 0;
                background-color: #f4f8fb;
                display: flex;
                flex-direction: column;
                align-items: center;
            }

            header {
                background-color: #2c6e49;
                color: white;
                width: 100%;
                text-align: center;
                padding: 20px 0;
                font-size: 28px;
                font-weight: bold;
            }

            .container {
                margin-top: 30px;
                display: flex;
                flex-direction: column;
                gap: 15px;
                width: 80%;
                max-width: 600px;
                text-align: center;
            }

            .box {
                background-color: white;
                padding: 15px;
                border-radius: 8px;
                box-shadow: 0px 2px 6px rgba(0,0,0,0.1);
                font-size: 18px;
            }

            .help-text {
                color: blue;
                cursor: pointer;
            }

            .help-report {
                font-style: italic;
                color: darkred
            }

            .game-field {
                margin-top: 20px;
                display: flex;
                flex-direction: column;
                gap: 10px;
            }

            .row {
                display: flex;
                justify-content: center;
                gap: 10px;
            }

            .cell img {
                width: 50px;
                height: 50px;
                object-fit: cover;
                border-radius: 6px;
            }
        </style>
    </head>
    <body>
        <header>
            Carson Mallen Bird Hunt
        </header>
        <div class="container">
            <div class="box">
                Click on the locations to find the birds, watch out for the forbidden statue.
            </div>
            
            <div class="box" id="locations">
                Number of locations checked is zero.
            </div>

            <div class="box" id="score">
                Score is 0 
            </div>

            <div class="box help-text" onclick="help()">
                Click for help
            </div>

            <div class="box help-report" id="help">
                Help report
            </div>

            <div class="game-field">
                <div class = "row">
                    <div class="cell"><img id = "img0" src="bush.jpg" alt="bush" onclick="check(0)"></div>
                    <div class="cell"><img id = "img1" src="bush.jpg" alt="bush" onclick="check(1)"></div>
                    <div class="cell"><img id = "img2" src="bush.jpg" alt="bush" onclick="check(2)"></div>
                    <div class="cell"><img id = "img3" src="bush.jpg" alt="bush" onclick="check(3)"></div>
                    <div class="cell"><img id = "img4" src="bush.jpg" alt="bush" onclick="check(4)"></div>
                    <div class="cell"><img id = "img5" src="bush.jpg" alt="bush" onclick="check(5)"></div>
                    <div class="cell"><img id = "img6" src="bush.jpg" alt="bush" onclick="check(6)"></div>
                </div>

                <div class="row">
                    <div class="cell"><img id = "img7" src="bush.jpg" alt="bush" onclick="check(7)"></div>
                    <div class="cell"><img id = "img8" src="bush.jpg" alt="bush" onclick="check(8)"></div>
                    <div class="cell"><img id = "img9" src="bush.jpg" alt="bush" onclick="check(9)"></div>
                    <div class="cell"><img id = "img10" src="bush.jpg" alt="bush" onclick="check(10)"></div>
                    <div class="cell"><img id = "img11" src="bush.jpg" alt="bush" onclick="check(11)"></div>
                    <div class="cell"><img id = "img12" src="bush.jpg" alt="bush" onclick="check(12)"></div>
                    <div class="cell"><img id = "img13" src="bush.jpg" alt="bush" onclick="check(13)"></div>
                </div>

                <div class="row">
                    <div class="cell"><img id = "img14" src="bush.jpg" alt="bush" onclick="check(14)"></div>
                    <div class="cell"><img id = "img15" src="bush.jpg" alt="bush" onclick="check(15)"></div>
                    <div class="cell"><img id = "img16" src="bush.jpg" alt="bush" onclick="check(16)"></div>
                    <div class="cell"><img id = "img17" src="bush.jpg" alt="bush" onclick="check(17)"></div>
                    <div class="cell"><img id = "img18" src="bush.jpg" alt="bush" onclick="check(18)"></div>
                    <div class="cell"><img id = "img19" src="bush.jpg" alt="bush" onclick="check(19)"></div>
                    <div class="cell"><img id = "img20" src="bush.jpg" alt="bush" onclick="check(20)"></div>
                </div>

                <div class="row">
                    <div class="cell"><img id = "img21" src="bush.jpg" alt="bush" onclick="check(21)"></div>
                    <div class="cell"><img id = "img22" src="bush.jpg" alt="bush" onclick="check(22)"></div>
                    <div class="cell"><img id = "img23" src="bush.jpg" alt="bush" onclick="check(23)"></div>
                    <div class="cell"><img id = "img24" src="bush.jpg" alt="bush" onclick="check(24)"></div>
                    <div class="cell"><img id = "img25" src="bush.jpg" alt="bush" onclick="check(25)"></div>
                    <div class="cell"><img id = "img26" src="bush.jpg" alt="bush" onclick="check(26)"></div>
                    <div class="cell"><img id = "img27" src="bush.jpg" alt="bush" onclick="check(27)"></div>
                </div>

                <div class="row">
                    <div class="cell"><img id = "img28" src="bush.jpg" alt="bush" onclick="check(28)"></div>
                    <div class="cell"><img id = "img29" src="bush.jpg" alt="bush" onclick="check(29)"></div>
                    <div class="cell"><img id = "img30" src="bush.jpg" alt="bush" onclick="check(30)"></div>
                    <div class="cell"><img id = "img31" src="bush.jpg" alt="bush" onclick="check(31)"></div>
                    <div class="cell"><img id = "img32" src="bush.jpg" alt="bush" onclick="check(32)"></div>
                    <div class="cell"><img id = "img33" src="bush.jpg" alt="bush" onclick="check(33)"></div>
                    <div class="cell"><img id = "img34" src="bush.jpg" alt="bush" onclick="check(34)"></div>
                </div>
            </div>
            <script>
                var ids = [
                    "img0","img1","img2","img3","img4","img5","img6",
                    "img7","img8","img9","img10","img11","img12","img13",
                    "img14","img15","img16","img17","img18","img19","img20",
                    "img21","img22","img23","img24","img25","img26","img27",
                    "img28","img29","img30","img31","img32","img33","img34"
                ]

                var score = 0 
                var locationsVisited = 0
                var lastLocation = 0

                var statueLocation = 19 
                var toucanLocation = 14
                
                var lorikeetLocations = [3,25]
                var buntingLocations = [2,5,11,20,21]

                var gameOver = false
                function check(position) {
                    if(gameOver) return

                    var id = ids[position]
                    var img = document.getElementById(id)

                    if (position == statueLocation) {
                        img.src = "statue.jpg"
                        score -= 3
                        gameOver = true
                    }

                    else if (position == toucanLocation) {
                        img.src = "toucan.jpg"
                        score += 5
                        img.onclick = null
                    }

                    else if (lorikeetLocations.includes(position)) {
                        img.src = "lorikeet.jpg"
                        score += 3
                        img.onclick = null
                    }

                    else if (buntingLocations.includes(position)) {
                        img.src = "bunting.jpg"
                        score += 1
                        img.onclick = null
                    }
                    
                    else {
                        img.src = "bush.jpg"
                    }

                    locationsVisited ++
                    document.getElementById("locations").innerHTML = 
                        "Number of locations checked is " + locationsVisited
                    
                    document.getElementById("score").innerHTML = 
                        "Score is " + score
                    
                    lastLocation = position
                }

                function help() {
                    var result = "slience"

                    var neighbors = [
                        (lastLocation + 1) % 35,
                        (lastLocation + 34) % 35,
                        (lastLocation + 7) % 35,
                        (lastLocation + 28) % 35
                    ]

                    for (let n of neighbors) {
                        if(buntingLocations.includes(n)){
                            result = "cheep"
                        }
                    }
                    
                    let row = Math.floor(lastLocation / 7)
                    let col = lastLocation % 7

                    for (let r = row-1; r <= row+1; r++) {
                        for (let c =col-1; c <= col+1; c++){
                            if (r >= 0 && r < 5 &&  c >= 0 && c < 7) {
                                let pos = r*7 + c
                                if (pos == toucanLocation) {
                                    result = "caw"
                                }

                                else if (pos == statueLocation) {
                                    result = "thrrum"
                                }
                            }
                        }
                    }

                    

                    document.getElementById("help").innerHTML = result
                }
            </script>
        </div>
    </body>
</html>
